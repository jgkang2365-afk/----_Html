<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity - Code Architecture Visualizer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary-color: #38bdf8;
            --secondary-color: #818cf8;
            --accent-color: #f472b6;
            --node-page: #38bdf8;
            --node-feature: #818cf8;
            --node-ui: #fbbf24;
            --node-core: #f472b6;
            --link-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        .header {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 10;
            pointer-events: none;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 0.5rem 0 0;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .legend {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 1rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.75rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--primary-color);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 20;
            font-size: 0.875rem;
        }

        .tooltip b {
            display: block;
            margin-bottom: 0.25rem;
            color: var(--primary-color);
        }

        .info-panel {
            position: absolute;
            top: 2rem;
            right: 2rem;
            width: 280px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.875rem;
        }

        .info-panel h3 {
            margin: 0 0 1rem;
            font-size: 1rem;
            color: var(--primary-color);
        }

        .update-tag {
            display: inline-block;
            background: rgba(244, 114, 182, 0.2);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 1rem;
            border: 1px solid rgba(244, 114, 182, 0.3);
        }

        circle {
            transition: r 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ANTIGRAVITY CODE MAP</h1>
        <p>측정일지 프로젝트 아키텍처 시각화</p>
    </div>

    <div id="canvas-container"></div>

    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background: var(--node-page)"></div><span>Pages (Routes)</span></div>
        <div class="legend-item"><div class="legend-color" style="background: var(--node-feature)"></div><span>Features (Components)</span></div>
        <div class="legend-item"><div class="legend-color" style="background: var(--node-ui)"></div><span>UI Components</span></div>
        <div class="legend-item"><div class="legend-color" style="background: var(--node-core)"></div><span>External API / Core</span></div>
    </div>

    <div class="info-panel">
        <h3>💡 최근 업데이트 (2026-05-03)</h3>
        <p><b>Modal Navigation 개선</b></p>
        <p style="color: #94a3b8; font-size: 0.8rem; line-height: 1.5;">
            Modal 컴포넌트가 브라우저 History API와 직접 연결되어, 모바일 뒤로가기 시 페이지 이탈을 방지하고 모달만 닫히도록 개선되었습니다.
        </p>
        <div class="update-tag">NEW: History API Sync</div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        const data = {
            nodes: [
                // Pages
                { id: "App", group: "page", label: "App Root", size: 30 },
                { id: "DashboardPage", group: "page", label: "/dashboard" },
                { id: "JournalPage", group: "page", label: "/journal" },
                { id: "UserPage", group: "page", label: "/users" },
                { id: "BusinessPage", group: "page", label: "/businesses" },
                { id: "SurveyPage", group: "page", label: "/survey" },
                
                // Features
                { id: "JournalSearch", group: "feature", label: "JournalSearch" },
                { id: "JournalRegisterModal", group: "feature", label: "JournalRegisterModal" },
                { id: "UserManagement", group: "feature", label: "UserManagement" },
                { id: "BusinessManagement", group: "feature", label: "BusinessManagement" },
                { id: "SurveyForm", group: "feature", label: "SurveyForm" },
                
                // UI Components
                { id: "Modal", group: "ui", label: "Common Modal", size: 25 },
                { id: "Button", group: "ui", label: "Button" },
                { id: "Input", group: "ui", label: "Input" },
                { id: "Table", group: "ui", label: "Table" },
                
                // External
                { id: "HistoryAPI", group: "core", label: "Browser History API", size: 20 },
                { id: "NextRouter", group: "core", label: "Next.js Router" }
            ],
            links: [
                { source: "App", target: "DashboardPage" },
                { source: "App", target: "JournalPage" },
                { source: "App", target: "UserPage" },
                { source: "App", target: "BusinessPage" },
                
                { source: "JournalPage", target: "JournalSearch" },
                { source: "JournalSearch", target: "JournalRegisterModal" },
                { source: "JournalSearch", target: "Modal" },
                { source: "JournalRegisterModal", target: "Modal" },
                
                { source: "UserPage", target: "UserManagement" },
                { source: "UserManagement", target: "Modal" },
                
                { source: "BusinessPage", target: "BusinessManagement" },
                { source: "BusinessManagement", target: "Modal" },
                
                { source: "Modal", target: "Button" },
                { source: "Modal", target: "HistoryAPI", type: "highlight" },
                { source: "Modal", target: "NextRouter" }
            ]
        };

        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#canvas-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");

        // Zoom & Pan
        svg.call(d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            }));

        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-800))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(60));

        const link = g.append("g")
            .selectAll("line")
            .data(data.links)
            .join("line")
            .attr("stroke", d => d.type === 'highlight' ? 'var(--accent-color)' : 'var(--link-color)')
            .attr("stroke-width", d => d.type === 'highlight' ? 3 : 1.5)
            .attr("stroke-dasharray", d => d.type === 'highlight' ? "5,5" : "none");

        const node = g.append("g")
            .selectAll("g")
            .data(data.nodes)
            .join("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        node.append("circle")
            .attr("r", d => d.size || 15)
            .attr("fill", d => {
                if (d.group === "page") return "var(--node-page)";
                if (d.group === "feature") return "var(--node-feature)";
                if (d.group === "ui") return "var(--node-ui)";
                return "var(--node-core)";
            })
            .attr("stroke", "#fff")
            .attr("stroke-width", 2)
            .style("filter", "drop-shadow(0 0 8px rgba(0,0,0,0.5))");

        node.append("text")
            .attr("dx", 20)
            .attr("dy", 4)
            .attr("fill", "#fff")
            .style("font-size", "12px")
            .style("font-weight", "600")
            .text(d => d.label);

        node.on("mouseover", (event, d) => {
            const tooltip = d3.select("#tooltip");
            tooltip.style("opacity", 1)
                .html(`<b>${d.label}</b>Type: ${d.group.toUpperCase()}<br>ID: ${d.id}`)
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 10) + "px");
            
            d3.select(event.currentTarget).select("circle").attr("r", (d.size || 15) * 1.3);
        })
        .on("mouseout", (event, d) => {
            d3.select("#tooltip").style("opacity", 0);
            d3.select(event.currentTarget).select("circle").attr("r", d.size || 15);
        });

        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("transform", d => `translate(${d.x},${d.y})`);
        });

        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }

        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }

        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }

        window.addEventListener('resize', () => {
            simulation.force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));
            simulation.alpha(1).restart();
        });
    </script>
</body>
</html>
